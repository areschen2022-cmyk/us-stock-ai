name: US Stock AI Daily

on:
  schedule:
    # Dashboard update: Mon-Fri 21:30 UTC = ~5:30 PM ET (after market close)
    - cron: "30 21 * * 1-5"
    # Morning Telegram: Mon-Fri 10:00 UTC = ~6 AM ET
    - cron: "0 10 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode (update / telegram / check / export)"
        default: "update"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: us-stock-ai-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dashboard-update:
    name: Daily Score Update & Dashboard
    if: >
      github.event.schedule == '30 21 * * 1-5' ||
      (
        github.event_name == 'workflow_dispatch' &&
        (inputs.mode == 'update' || inputs.mode == 'check' || inputs.mode == 'export')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Full-market S-grade scan (Mondays; watchlist candidates)
        continue-on-error: true
        run: python scripts/scan_market_candidates.py

      - name: Run daily scoring pipeline
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python main.py

      - name: Post-update health check
        run: python scripts/post_update_check.py

      - name: Knowledge hub export
        continue-on-error: true
        run: python scripts/export_learning_to_knowledge_hub.py

      - name: Commit dashboard & knowledge exports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/dashboard_data.json docs/performance_data.json docs/divergence_history.json
          git add data/market_scan.json || true
          git add -f data/us_stock_ai.sqlite3 || true
          git diff --staged --quiet || git commit -m "chore: update dashboard $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase && git push && break
            echo "push attempt $i failed, retrying after rebase..."
            sleep 5
          done

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages

  morning-telegram:
    name: Morning Telegram Brief
    if: >
      github.event.schedule == '0 10 * * 1-5' ||
      (
        github.event_name == 'workflow_dispatch' &&
        inputs.mode == 'telegram'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send morning Telegram brief
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python main.py --telegram-only

      - name: Commit delivery log
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/us_stock_ai.sqlite3 || true
          git diff --staged --quiet || git commit -m "chore: morning telegram log $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase && git push && break
            echo "push attempt $i failed, retrying after rebase..."
            sleep 5
          done
